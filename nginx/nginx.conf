# ── SigeDash — nginx reverse proxy ────────────────────────────────────────────
# Coloque os certificados SSL em nginx/certs/:
#   fullchain.pem  — certificado + cadeia (Let's Encrypt ou outro)
#   privkey.pem    — chave privada
#
# Para obter certificados gratuitos com Let's Encrypt (na primeira vez):
#   docker run --rm -p 80:80 \
#     -v $(pwd)/nginx/certs:/etc/letsencrypt/live/dash.sigedash.com.br \
#     certbot/certbot certonly --standalone \
#     -d dash.sigedash.com.br --agree-tos -m seu@email.com
# ------------------------------------------------------------------------------

# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name dash.sigedash.com.br;
    return 301 https://$host$request_uri;
}

# HTTPS principal
server {
    listen 443 ssl;
    server_name dash.sigedash.com.br;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # Compressão (PWA + API JSON)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    # Proxy para o backend .NET (porta interna 8080)
    location / {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
