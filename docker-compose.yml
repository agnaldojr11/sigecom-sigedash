services:

  backend:
    # Dev/build local: BACKEND_IMAGE não definido → usa o nome local
    # Produção (CI/CD): BACKEND_IMAGE=ghcr.io/agnaldojr11/sigecom-sigedash:vX.Y.Z
    image: ${BACKEND_IMAGE:-sigedash-backend}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sigedash-backend
    restart: unless-stopped
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sigedash

  db:
    image: postgres:16-alpine
    container_name: sigedash-db
    restart: unless-stopped
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sigedash

  nginx:
    image: nginx:alpine
    container_name: sigedash-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - sigedash

volumes:
  pgdata:

networks:
  sigedash:
    driver: bridge
