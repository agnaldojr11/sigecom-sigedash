name: Build — Instalador do Agente

# Ativado manualmente quando o agente estiver desenvolvido
on:
  workflow_dispatch:

jobs:

  build-installer:
    name: Build Instalador Windows (.exe)
    runs-on: windows-latest     # .NET 4.8 e MSBuild já presentes no runner

    steps:
      - uses: actions/checkout@v4

      # ── 1. Extrai versão da tag (remove o "v" inicial) ──────────────────────
      - name: Extrai versão
        id: ver
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$v" >> $env:GITHUB_OUTPUT
          echo "Versão: $v"

      # ── 2. Publica agente em Release x64 ────────────────────────────────────
      - name: Publish agente (Release x64)
        shell: cmd
        run: |
          dotnet publish agente\SigeDash.Agente\SigeDash.Agente.csproj ^
            -c Release ^
            -r win-x64 ^
            --self-contained false ^
            -o deploy\agente\bin ^
            -p:DebugType=None ^
            -p:DebugSymbols=false ^
            -p:Version=${{ steps.ver.outputs.VERSION }}

      # ── 3. Instala Inno Setup 6 (via Chocolatey, já no runner) ──────────────
      - name: Instala Inno Setup 6
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      # ── 4. Gera o instalador .exe ────────────────────────────────────────────
      - name: Gera instalador
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $iss  = "deploy\agente\instalar-agente.iss"
          & $iscc /dAppVersion=${{ steps.ver.outputs.VERSION }} $iss
          if ($LASTEXITCODE -ne 0) { throw "Falha ao gerar instalador" }

      # ── 5. Exibe o arquivo gerado ────────────────────────────────────────────
      - name: Lista artefato
        shell: pwsh
        run: Get-ChildItem dist\*.exe | Select-Object Name, Length

      # ── 6. Cria GitHub Release e anexa o .exe ───────────────────────────────
      - name: Cria GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name:    "SigeDash ${{ github.ref_name }}"
          draft:   false
          prerelease: ${{ contains(github.ref_name, '-') }}  # v1.0.0-beta → prerelease
          generate_release_notes: true
          files: |
            dist/SigeDashAgente-Setup-v${{ steps.ver.outputs.VERSION }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
