name: Deploy — Backend VPS

# Disparado ao criar uma tag de versão: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE:    ghcr.io/${{ github.repository_owner }}/sigecom-sigedash

jobs:

  # ── 1. Build + Push da imagem Docker ────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # necessário para push no ghcr.io

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extrai versão da tag
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME}"          # ex: v1.2.3
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 2. Deploy no VPS via SSH ─────────────────────────────────────────────────
  deploy-vps:
    name: Deploy VPS (SSH)
    needs: build-push
    runs-on: ubuntu-latest

    # Secrets necessários (configurar em Settings > Secrets do repositório):
    #   VPS_HOST        — IP ou hostname do VPS (ex: 123.45.67.89)
    #   VPS_USER        — usuário SSH (ex: deploy)
    #   VPS_SSH_KEY     — chave privada SSH (conteúdo do arquivo id_rsa)
    #   VPS_DEPLOY_PATH — pasta do projeto no VPS (ex: /opt/sigedash)
    #   GHCR_TOKEN      — GitHub PAT com permissão read:packages (para o VPS fazer pull)

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          envs:     GHCR_TOKEN,GITHUB_ACTOR,IMAGE_TAG
          script: |
            set -e
            # Login no registry para poder fazer pull da nova imagem
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            cd ${{ secrets.VPS_DEPLOY_PATH }}

            # Atualiza a variável BACKEND_IMAGE no .env (cria se não existir)
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${{ env.IMAGE }}:${{ needs.build-push.outputs.version }}|" .env \
              || echo "BACKEND_IMAGE=${{ env.IMAGE }}:${{ needs.build-push.outputs.version }}" >> .env

            # Puxa nova imagem e recria apenas o container do backend
            docker compose pull backend
            docker compose up -d --no-deps backend

            # Remove imagens antigas para economizar disco
            docker image prune -f

            echo "Deploy concluído: ${{ env.IMAGE }}:${{ needs.build-push.outputs.version }}"

  # ── (Opcional) Deploy Azure App Service ──────────────────────────────────────
  # Para usar Azure em vez de VPS, descomente e configure os secrets abaixo:
  #   AZURE_WEBAPP_NAME           — nome do App Service
  #   AZURE_WEBAPP_PUBLISH_PROFILE — perfil de publicação (baixado no portal Azure)
