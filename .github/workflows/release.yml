# A publicacao do release ASSINADO e feita pelo azure-pipelines.yml (servidor com o eToken).
# Aqui rodamos apenas o GATE de seguranca + build de validacao na tag (este workflow NAO publica).
name: CI de tag (gate + build)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # Gate de seguranca: a publicacao so ocorre se este job passar (sem segredo vazado nem dependencia vulneravel)
  seguranca:
    name: Gate de seguranca
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Segredos (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Dependencias vulneraveis (bloqueia a release)
        shell: bash
        run: |
          dotnet restore backend/src/SigeDash.Api/SigeDash.Api.csproj
          dotnet list backend/src/SigeDash.Api/SigeDash.Api.csproj package --vulnerable --include-transitive | tee vuln.txt
          if grep -q "has the following vulnerable" vuln.txt; then
            echo "::error::Dependencias vulneraveis encontradas - release BLOQUEADA. Atualize os pacotes."
            exit 1
          fi
          echo "Sem dependencias vulneraveis."

  build:
    needs: [seguranca]   # so valida o build se o gate de seguranca passar
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extrair versao da tag
        id: versao
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $versao = $tag.TrimStart("v")
          echo "VERSAO=$versao" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"       >> $env:GITHUB_OUTPUT

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build de validacao (nao publica; a release assinada sai do Azure DevOps)
        shell: pwsh
        run: |
          .\build-deploy.ps1 -Versao "${{ steps.versao.outputs.VERSAO }}"
